<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лабораторная 9</title>
    <style>
        body {
            background: #f0f0f0;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        h2 {
            margin-top: 40px;
            color: #333;
        }

        .task {
            background: white;
            padding: 30px;
            margin-bottom: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Задание 1 - Мячик */
        .ball-block {
            display: inline-block;
            text-align: center;
        }

        .ball {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c92a2a);
            border-radius: 50%;
            animation: jump 1.5s infinite ease-in-out;
        }

        .shadow {
            width: 80px;
            height: 20px;
            background: radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0.5), transparent 70%);
            border-radius: 50%;
            margin-top: -10px;
            filter: blur(4px);
            animation: shadowScale 1.5s infinite ease-in-out;
        }

        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            30% { transform: translateY(-80px); }
            70% { transform: translateY(10px) scale(1.2, 0.8); }
            85% { transform: translateY(0); }
        }

        @keyframes shadowScale {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            30% { transform: scale(0.8); opacity: 0.3; }
            70% { transform: scale(1.4); opacity: 0.7; }
        }

        /* Задание 2 - Пять объектов */
        .items {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .item {
            width: 100px;
            height: 100px;
            background: red;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .item1 { background: #ff6b6b; animation: rotate 3s infinite linear; }
        .item2 { background: #4dabf7; animation: scale 2s infinite alternate; }
        .item3 { background: #51cf66; animation: skew 2.5s infinite alternate; }
        .item4 { background: #9775fa; animation: move 3s infinite alternate; }
        .item5 { background: #ff922b; animation: combo 4s infinite; }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes scale {
            from { transform: scale(1); }
            to { transform: scale(1.5); }
        }

        @keyframes skew {
            from { transform: skew(0deg); }
            to { transform: skew(20deg); }
        }

        @keyframes move {
            from { transform: translateX(0); }
            to { transform: translateX(50px); }
        }

        @keyframes combo {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.3) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }

        /* Задание 3 - Квадрат в рамке */
        .border {
            width: 400px;
            height: 400px;
            border: 2px solid #333;
            position: relative;
            background: #fafafa;
        }

        .square {
            width: 50px;
            height: 50px;
            position: absolute;
            animation: bounceSquare 6s infinite linear;
        }

        @keyframes bounceSquare {
            0% { transform: translate(0, 0); background: red; }
            25% { transform: translate(350px, 0); background: blue; }
            50% { transform: translate(350px, 350px); background: green; }
            75% { transform: translate(0, 350px); background: orange; }
            100% { transform: translate(0, 0); background: red; }
        }
    </style>
</head>
<body>
    <h1>Лабораторная работа №9</h1>
    
    <div class="task">
        <h2>1. Прыгающий мяч с тенью</h2>
        <div class="ball-block">
            <div class="ball"></div>
            <div class="shadow"></div>
        </div>
        <p>Мяч прыгает и сплющивается, тень меняет размер</p>
    </div>

    <div class="task">
        <h2>2. Пять объектов с разной анимацией</h2>
        <div class="items">
            <div class="item item1">rotate</div>
            <div class="item item2">scale</div>
            <div class="item item3">skew</div>
            <div class="item item4">move</div>
            <div class="item item5">combo</div>
        </div>
    </div>

    <div class="task">
        <h2>3. Квадрат бьется о границы</h2>
        <div class="border">
            <div class="square"></div>
        </div>
        <p>Квадрат движется по периметру и меняет цвет при ударе</p>
    </div>
</body>
</html>
